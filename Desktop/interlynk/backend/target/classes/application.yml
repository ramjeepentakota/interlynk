server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  # Drain in-flight requests on SIGTERM instead of cutting them off.
  shutdown: graceful
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

spring:
  application:
    name: interlynk
  main:
    allow-bean-definition-overriding: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:interlynk}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useConfigs=maxPerformance
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Jackma@939512}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: InterlynkHikariCP
      auto-commit: true
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}


    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        query:
          plan_cache_max_size: 2048
    open-in-view: false
  
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
      file-size-threshold: 2KB

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC
    default-property-inclusion: non_null

  # SMTP — defaults to "no host", in which case EmailService no-ops.
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

  web-resources:
    static-locations: classpath:/static/

# Application-specific configuration
app:
  # Security configuration
  security:
    jwt:
      secret: ${JWT_SECRET:enterprise-collab-secret-key-change-in-production-very-long-string-minimum-256-bits}
      expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days in milliseconds
      remember-me-expiration: ${JWT_REMEMBER_ME_EXPIRATION:2592000000}  # 30 days in milliseconds
      remember-me-refresh-expiration: ${JWT_REMEMBER_ME_REFRESH_EXPIRATION:5184000000}  # 60 days in milliseconds
    password:
      bcrypt-cost: 4
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-minute: 100
      requests-per-hour: 1000
  
  # File storage configuration
  storage:
    base-path: ${STORAGE_PATH:./storage}
    repos-path: ${app.storage.base-path}/repos
    workspaces-path: ${app.storage.base-path}/user-workspaces
    uploads-path: ${app.storage.base-path}/uploads
    recordings-path: ${app.storage.base-path}/recordings
    logs-path: ${app.storage.base-path}/logs
    temp-path: ${app.storage.base-path}/temp
  
  # Code execution configuration
  execution:
    timeout: 30000  # 30 seconds
    memory-limit: 524288000  # 512MB
    max-output-size: 1048576  # 1MB
    allowed-languages:
      - python
      - java
      - javascript
      - go
      - cpp
      - rust
  
  # Platform settings
  platform:
    name: Enterprise Collaboration Platform
    max-file-size: 10485760  # 10MB
    max-message-length: 4000
    max-channel-members: 1000
    default-theme: dark
    enable-attachments: true
    enable-code-execution: true
    enable-video-calls: true
    enable-screen-sharing: true

  # Outbound email — disabled by default (set spring.mail.host + EMAIL_ENABLED=true)
  email:
    enabled: ${EMAIL_ENABLED:false}
    from: ${EMAIL_FROM:noreply@interlynk.local}
    subject-prefix: "[Interlynk] "

  # Data retention sweeper (see RetentionScheduler)
  retention:
    enabled: ${RETENTION_ENABLED:true}
    messages-days: ${RETENTION_MESSAGES_DAYS:0}     # 0 = never delete
    audit-days: ${RETENTION_AUDIT_DAYS:365}
    notifications-days: ${RETENTION_NOTIFICATIONS_DAYS:60}
    login-history-days: ${RETENTION_LOGIN_DAYS:90}
    sweep-cron: ${RETENTION_CRON:0 30 3 * * *}      # 03:30 every day

# LiveKit (SFU) configuration — enables real multi-party audio/video.
# Leave blank to run without a media server: calls still show the participant
# roster but carry no live media. Get credentials from https://cloud.livekit.io
# or a self-hosted LiveKit server.
livekit:
  url: ${LIVEKIT_URL:}            # e.g. wss://your-project.livekit.cloud
  api-key: ${LIVEKIT_API_KEY:}    # e.g. APIxxxxxxxxxxx
  api-secret: ${LIVEKIT_API_SECRET:}
  token-ttl-seconds: ${LIVEKIT_TOKEN_TTL:21600}  # 6 hours

# Logging configuration (rolling + JSON appenders live in logback-spring.xml)
logging:
  file:
    name: ${app.storage.logs-path}/application.log
  level:
    root: ${LOG_LEVEL:INFO}
    com.enterprise.collab: ${LOG_LEVEL_APP:DEBUG}

# WebSocket configuration
springwebsocket:
  message:
    buffer-size: 81920
  inbound:
    buffer-size: 81920
  outbound:
    buffer-size: 81920
  broker:
    enabled: false  # Set to true for Redis-based broker (requires Redis)

# Redis configuration (disabled by default - set spring.redis.enabled=true to enable)
spring.redis:
  enabled: false
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: ${REDIS_DATABASE:0}
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 2
      max-wait: -1ms

# Cache configuration
spring.cache:
  type: redis
  redis:
    time-to-live: 1800000  # 30 minutes default TTL
    cache-null-values: false

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      # Spring Boot resolves liveness/readiness automatically when probes.enabled=true
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    export:
      prometheus:
        enabled: true

# SpringDoc / Swagger configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

# Additional profiles can be configured via environment variables
# Example: spring.profiles.active=prod
