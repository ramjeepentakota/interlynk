name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: backend / maven
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-root-pw
          MYSQL_DATABASE: interlynk
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile + test
        working-directory: backend
        env:
          DB_USERNAME: root
          DB_PASSWORD: ci-root-pw
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_NAME: interlynk
          JWT_SECRET: ci-test-secret-only-for-ci-not-for-production-use-32-bytes-long
          SPRING_PROFILES_ACTIVE: ci
        run: mvn -B -ntp -DskipITs=false verify
      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  frontend:
    name: frontend / vite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type-check + build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test --if-present
