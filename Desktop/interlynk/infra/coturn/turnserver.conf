# coturn TURN/STUN relay for InterLynk voice channels (full-mesh WebRTC) and
# 1-on-1 calls. coturn is BSD-3-Clause licensed — free to use and ship with a
# product you sell. Docs: https://github.com/coturn/coturn
#
# A TURN relay is what lets two browsers on different networks/firewalls reach
# each other. Without it, mesh voice only connects on a cooperative LAN.
#
# NATIVE install (no Docker): this file is copied to /etc/turnserver.conf and
# run by the system `coturn` service. See README.md / install-coturn.sh.

# ── Listening ports ───────────────────────────────────────────────────────────
listening-port=3478
# tls-listening-port=5349        # enable for turns:// (needs cert/pkey below)

# ── Relay UDP port range — MUST be open on the VPS firewall (ufw + Hostinger
#    hPanel firewall). 100 ports is plenty for team-sized voice channels.
min-port=49152
max-port=49252

# ── Authentication ─────────────────────────────────────────────────────────────
# Long-term credential mechanism with one static user. CHANGE the password
# before deploying anywhere reachable from the internet.
# NOTE: static credentials shipped to the browser let anyone use your relay.
# For production, prefer the ephemeral (REST API) scheme — see README
# "Securing the relay for production".
lt-cred-mech
user=interlynk:CHANGE_ME_TURN_PASSWORD
realm=interlynk

# ── Public address ──────────────────────────────────────────────────────────────
# The relay must advertise the address clients actually reach it on.
#   • Cloud VM  → set this to the box's PUBLIC IP.
#   • LAN test  → set this to the host's LAN IP (e.g. 192.168.x.x).
# Without it, relayed ICE candidates can be unreachable.
# external-ip=YOUR.PUBLIC.IP.HERE

# ── TLS (optional, recommended for production: enables turns:// on 443/5349) ────
# Survives strict firewalls that only allow TLS egress. Provide real certs:
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem

# ── Hardening ──────────────────────────────────────────────────────────────────
fingerprint
no-multicast-peers
no-tlsv1
no-tlsv1_1
# SSRF protection: stop the relay forwarding to internal/cloud-metadata ranges.
# Enable these in PRODUCTION. (Leave commented for LAN testing, where peers ARE
# on private ranges and would otherwise be blocked.)
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255
# denied-peer-ip=169.254.0.0-169.254.255.255

# ── Logging ────────────────────────────────────────────────────────────────────
log-file=stdout
simple-log
